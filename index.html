<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Natal Chart Calculator - Astro App Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(to bottom, #f0f4f8, #d9e2ec);
      color: #1e293b;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #1e40af;
      margin-bottom: 1.5rem;
    }
    form {
      display: grid;
      gap: 1.2rem;
    }
    label {
      display: grid;
      gap: 0.5rem;
      font-weight: 500;
    }
    input {
      padding: 0.8rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      font-size: 1rem;
    }
    button {
      padding: 1rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) {
      background: #4338ca;
    }
    button:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }
    #result {
      margin-top: 2rem;
      padding: 1.5rem;
      background: #f8fafc;
      border-radius: 0.75rem;
      border: 1px solid #e2e8f0;
    }
    #result h2 {
      margin-top: 0;
      color: #1e40af;
    }
    .planet-item {
      margin: 1rem 0;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e2e8f0;
    }
    .planet-item:last-child {
      border-bottom: none;
    }
    #error {
      margin-top: 1rem;
      color: #ef4444;
      font-weight: 500;
    }
    #loading {
      text-align: center;
      margin-top: 1rem;
      color: #64748b;
    }
  </style>
</head>

  <div class="container">
    <h1>Western Natal Chart Calculator</h1>
