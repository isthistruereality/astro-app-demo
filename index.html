<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Natal Chart Calculator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)),
                  url('https://i.imgur.com/your-image-host-link-here.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #f0f4f8;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(20, 20, 30, 0.75);
      backdrop-filter: blur(10px);
      padding: 2.5rem;
      border-radius: 1.2rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    h1 {
      text-align: center;
      color: #ffd166;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      margin-bottom: 1.5rem;
    }
    form {
      display: grid;
      gap: 1.5rem;
    }
    label {
      display: grid;
      gap: 0.6rem;
      font-weight: 500;
    }
    input, select {
      padding: 0.9rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0.6rem;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.08);
      color: white;
    }
    input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    button {
      padding: 1.1rem;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      color: white;
      border: none;
      border-radius: 0.6rem;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,107,107,0.4);
      transition: all 0.2s;
    }
    button:hover:not(:disabled) {
      background: linear-gradient(135deg, #ff8e53, #ff6b6b);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,107,0.6);
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
      box-shadow: none;
    }
    #result {
      margin-top: 2.5rem;
      padding: 1.8rem;
      background: rgba(30, 30, 45, 0.8);
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #result h2 {
      margin-top: 0;
      color: #ffd166;
    }
    .planet-item {
      margin: 1.2rem 0;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .planet-item:last-child {
      border-bottom: none;
    }
    #error {
      margin-top: 1.5rem;
      color: #ff6b6b;
      font-weight: 500;
    }
    #loading {
      text-align: center;
      margin-top: 1.5rem;
      color: #a5b4fc;
      font-size: 1.1rem;
    }
    small.note {
      font-size: 0.9rem;
      color: #a5b4fc;
      display: block;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Western Natal Chart Calculator</h1>
    <p style="text-align: center; color: #a5b4fc; margin-bottom: 2rem;">Enter your birth details to get your planetary positions.</p>

    <form id="birthForm">
      <label>
        Year
        <input type="number" name="year" required min="1900" max="2100" value="1990" />
      </label>
      <label>
        Month (1–12)
        <input type="number" name="month" required min="1" max="12" value="3" />
      </label>
      <label>
        Day (1–31)
        <input type="number" name="date" required min="1" max="31" value="4" />
      </label>
      <label>
        Hour (0–23)
        <input type="number" name="hours" required min="0" max="23" value="14" />
      </label>
      <label>
        Minute (0–59)
        <input type="number" name="minutes" required min="0" max="59" value="30" />
      </label>
      <label>
        City or Town of Birth
        <input type="text" name="birth_city" required placeholder="e.g., Denver, Colorado, USA" />
        <small class="note">
          We'll automatically look up coordinates and timezone (including DST on your birth date).
        </small>
      </label>

      <button type="submit" id="submitBtn">Calculate Chart</button>
    </form>

    <div id="loading" style="display: none;">Calculating your chart...</div>
    <div id="result"></div>
    <div id="error"></div>
  </div>

  <script>
    const form = document.getElementById('birthForm');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Calculating...';
      loading.style.display = 'block';
      resultDiv.innerHTML = '';
      errorDiv.innerHTML = '';
